name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'Multi-Page E-Learning Platform/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: 'Multi-Page E-Learning Platform'
          branch: gh-pages
